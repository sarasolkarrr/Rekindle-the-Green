<!DOCTYPE html>
<html lang="en">
<head>
     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
     
    <style>
        #map{position: absolute;top:0;bottom: 0;right: 0;left: 0;}
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <script>
    var map = L.map('map').setView([23,80], 5);
    var iconOptions = {
        iconUrl : 'tiger.png',
        iconSize: [100,76]  
    }
    var tiger =L.icon(iconOptions);
    var tigermarker = {
        icon: tiger,
        draggable: false ,
        title : "Jim Corbett National Park" 
    }
    var tigermarker2 = L.marker([30,79],tigermarker).addTo(map).bindPopup("Jim Corbett National Park")
    tigermarker2.on('click', function(){
        window.location.href = "tiger.html"
    })

    var lionopt = {
        iconUrl : 'lion.png',
        iconSize: [70,36]  
    }
    var lion =L.icon(lionopt);
    var lionmarker = {
        icon: lion,
        draggable: false ,
        title : "Gir National Park" 
    }
    var lionmarker2 = L.marker([21.08,70.79],lionmarker).addTo(map).bindPopup("Gir National Park")
    lionmarker2.on('click', function(){
        window.location.href = "lion.html"
    })
    
    


    L.tileLayer('https://api.maptiler.com/maps/hybrid-v4/{z}/{x}/{y}.jpg?key=hYPG3mJkV44SssjFGx1a', {
        attribution: '<a href="https://www.maptiler.com/copyright/" target="_blank">&copy; MapTiler</a> <a href="https://www.openstreetmap.org/copyright" target="_blank">&copy; OpenStreetMap contributors</a>'
    }).addTo(map);
</script>
</body>
</html>
