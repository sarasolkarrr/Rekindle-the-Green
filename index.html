    <div class="map-tip" id="mapTip">

      <strong>Tap an animal</strong> on the map to discover conservation stories and play a minigame! 🌏

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
      var map = L.map("map").setView([23, 80], 5);

      
      L.tileLayer(
        "https://api.maptiler.com/maps/hybrid-v4/{z}/{x}/{y}.jpg?key=hYPG3mJkV44SssjFGx1a",
        {
          attribution:
            '<a href="https://www.maptiler.com/copyright/" target="_blank">&copy; MapTiler</a> ' +
            '<a href="https://www.openstreetmap.org/copyright" target="_blank">&copy; OpenStreetMap contributors</a>',
        }
      ).addTo(map);

      
      function circleIcon(emoji) {
        return L.divIcon({
          html: '<div class="c-marker">' + emoji + '</div>',
          className: '',
          iconSize:    [58, 58],
          iconAnchor:  [29, 29],
          popupAnchor: [0, -34]
        });
      }

      
      function pulse(marker) {
        var el = marker.getElement();
        if (!el) return;
        var dot = el.querySelector('.c-marker');
        if (!dot) return;
        dot.classList.remove('pulse');
        void dot.offsetWidth;
        dot.classList.add('pulse');
        dot.addEventListener('animationend', function(){ dot.classList.remove('pulse'); }, { once: true });
      }

      
      var corbettM = L.marker([30, 79], { icon: circleIcon('🐯'), title: 'Jim Corbett National Park' })
        .addTo(map)
        .bindPopup('<b>🐯 Jim Corbett National Park</b><br>Tiger Conservation — Uttarakhand');

      corbettM.on('click', function () {
        pulse(corbettM);
        setTimeout(function(){ window.location.href = 'tiger.html'; }, 550);
      });

      
      var girM = L.marker([21.08, 70.79], { icon: circleIcon('🦁'), title: 'Gir National Park' })
        .addTo(map)
        .bindPopup('<b>🦁 Gir National Park</b><br>Lion Conservation — Gujarat');

      girM.on('click', function () {
        pulse(girM);
        setTimeout(function(){ window.location.href = 'lion.html'; }, 550);
      });

      
      var velasM = L.marker([17.5302, 73.4082], { icon: circleIcon('🐢'), title: 'Velas Beach' })
        .addTo(map)
        .bindPopup('<b>🐢 Velas Beach</b><br>Turtle Conservation — Maharashtra');

      velasM.on('click', function () {
        pulse(velasM);
        setTimeout(function(){ window.location.href = 'turtle.html'; }, 550);
      });

     
      function flyTo(lat, lng, site) {
        map.flyTo([lat, lng], 8, { animate: true, duration: 1.2 });
        var targets = { corbett: corbettM, gir: girM, velas: velasM };
        setTimeout(function () {
          var m = targets[site];
          if (m) { m.openPopup(); pulse(m); }
        }, 1350);
      }
    </script>
